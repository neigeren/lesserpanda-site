<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>レッサーパンダ株式会社</title>
<style>
:root{
  --bg:#070a12;
  --text:rgba(255,255,255,.92);
  --muted:rgba(255,255,255,.65);
  --line:rgba(255,255,255,.12);
}
body{
  margin:0;
  font-family:system-ui,-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",sans-serif;
  background:var(--bg);
  color:var(--text);
}
header{
  position:sticky;
  top:0;
  z-index:50;
  background:rgba(7,10,18,.9);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.nav{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 14px;
}
.brand{
  font-weight:800;
  font-size:15px;
  line-height:1.2;
}
.menu-btn{
  display:none;
  font-size:14px;
  padding:8px 12px;
  border-radius:10px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.06);
  color:var(--text);
}
.navlinks{
  display:flex;
  gap:14px;
}
.navlinks a{
  color:var(--muted);
  font-size:14px;
}
@media(max-width:768px){
  .navlinks{
    display:none;
    flex-direction:column;
    gap:18px;
    padding:24px 16px;
  }
  .navlinks.active{display:flex;}
  .menu-btn{display:block;}
}
main{padding:24px;}
</style>
</head>
<body>
<header>
  <div class="nav">
    <div class="brand">レッサーパンダ株式会社</div>
    <button class="menu-btn" onclick="toggle()">メニュー</button>
  </div>
  <nav class="navlinks" id="menu">
    <a href="#services">事業内容</a>
    <a href="#about">会社概要</a>
    <a href="#contact">お問い合わせ</a>
    <a href="privacy.html">プライバシーポリシー</a>
    <a href="tokusho.html">特商法表記</a>
  </nav>
</header>

<main>
  <h1>誠実な取引と、納得感のある意思決定を。</h1>
  <p>レッサーパンダ株式会社は商品貿易・EC小売および投資相談を行っています。</p>
</main>

<script>
function toggle(){
  document.getElementById("menu").classList.toggle("active");
}
</script>
</body>
</html>
